<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1240"/>
      <stop offset="0.55" stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#1b1240" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- digest panel -->
  <rect x="90" y="70" width="1020" height="662" rx="26" fill="#ffffff" filter="url(#shadow)"/>

  <!-- header -->
  <circle cx="152" cy="126" r="11" fill="#f59e0b"/>
  <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round">
    <line x1="152" y1="104" x2="152" y2="110"/>
    <line x1="152" y1="142" x2="152" y2="148"/>
    <line x1="130" y1="126" x2="136" y2="126"/>
    <line x1="168" y1="126" x2="174" y2="126"/>
    <line x1="137" y1="111" x2="141" y2="115"/>
    <line x1="163" y1="137" x2="167" y2="141"/>
    <line x1="167" y1="111" x2="163" y2="115"/>
    <line x1="141" y1="137" x2="137" y2="141"/>
  </g>
  <text x="190" y="136" font-size="34" font-weight="700" fill="#1e1b3a">Daily Digest — June 21, 2026</text>
  <rect x="852" y="108" width="218" height="40" rx="20" fill="#ede9fe"/>
  <text x="961" y="134" font-size="17" font-weight="600" fill="#6d28d9" text-anchor="middle">Knowledge Hub agent</text>

  <!-- focus -->
  <text x="140" y="190" font-size="19" fill="#4b5563"><tspan font-weight="700" fill="#7c3aed">Focus  </tspan>PM interviews — metrics, experimentation, stakeholder management</text>
  <line x1="140" y1="212" x2="1060" y2="212" stroke="#ececf3" stroke-width="2"/>

  <!-- note 1 -->
  <circle cx="158" cy="256" r="17" fill="#7c3aed"/>
  <text x="158" y="262" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="190" y="252" font-size="22" font-weight="700" fill="#1e1b3a">Metrics for Product Managers</text>
  <text x="190" y="276" font-size="14" fill="#9ca3af">Product Management</text>
  <text x="190" y="303" font-size="16" fill="#4b5563">HEART (Happiness, Engagement, Adoption, Retention, Task Success) and AARRR anchor PM metrics —</text>
  <text x="190" y="325" font-size="16" fill="#4b5563">good metrics are understandable rates or ratios, not vanity counts.</text>
  <rect x="190" y="340" width="825" height="42" rx="10" fill="#f5f3ff"/>
  <rect x="190" y="340" width="5" height="42" rx="2.5" fill="#7c3aed"/>
  <text x="212" y="366" font-size="15" fill="#5b21b6"><tspan font-weight="700">Recall  </tspan>Run any product through HEART — name one signal and one metric for each letter.</text>

  <!-- note 2 -->
  <circle cx="158" cy="430" r="17" fill="#7c3aed"/>
  <text x="158" y="436" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="190" y="426" font-size="22" font-weight="700" fill="#1e1b3a">Designing and Running Experiments</text>
  <text x="190" y="450" font-size="14" fill="#9ca3af">Product Management</text>
  <text x="190" y="477" font-size="16" fill="#4b5563">MVP experiments produce validated learning cheaply — fail fast, riskiest assumption first.</text>
  <rect x="190" y="492" width="825" height="42" rx="10" fill="#f5f3ff"/>
  <rect x="190" y="492" width="5" height="42" rx="2.5" fill="#7c3aed"/>
  <text x="212" y="518" font-size="15" fill="#5b21b6"><tspan font-weight="700">Recall  </tspan>Test demand with zero engineering budget — which two MVP techniques fit, and why?</text>

  <!-- note 3 (faded, implies more) -->
  <g opacity="0.5">
    <circle cx="158" cy="594" r="17" fill="#7c3aed"/>
    <text x="158" y="600" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <text x="190" y="590" font-size="22" font-weight="700" fill="#1e1b3a">Customer Development</text>
    <text x="190" y="614" font-size="14" fill="#9ca3af">Product Management</text>
    <text x="190" y="641" font-size="16" fill="#4b5563">Discovery → Validation → Development → Iteration; four interview types, open-ended questions.</text>
  </g>

  <!-- footer -->
  <line x1="140" y1="678" x2="1060" y2="678" stroke="#ececf3" stroke-width="2"/>
  <text x="140" y="706" font-size="14" fill="#9ca3af">Generated each morning by the Knowledge Hub agent · ranked by relevance to focus + time since last seen</text>
</svg>
